name: Deploy to Production
# =================================================================
# Production deployment for the ALA medical application.
#
# Triggers: push to `main`, or manual workflow_dispatch.
# Safety:   GH Environment `production` requires reviewer approval
#           before the deploy job's SSH steps can run.
# Strategy: Calls deployment/swarm-deploy on the VM — Docker Swarm
#           rolling update with 2 replicas per service. Zero downtime
#           when re-deploying with active users in the app.
#
# Required GitHub configuration:
#   Secrets (Settings > Secrets and variables > Actions):
#     - AZURE_VM_HOST     (e.g. "20.217.84.100")
#     - AZURE_VM_USERNAME (e.g. "azureuser")
#     - AZURE_VM_SSH_KEY  (private key, no passphrase, dedicated to CI)
#   Environment (Settings > Environments):
#     - production with required-reviewer protection
# =================================================================

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_backup:
        description: "Skip database backup (not recommended)"
        required: false
        default: false
        type: boolean

env:
  AZURE_VM_IP: "20.217.84.100"
  PUBLIC_URL: "https://ala-app.israelcentral.cloudapp.azure.com"

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production # Approval gate

    steps:
      - name: Create Production Backup
        if: ${{ inputs.skip_backup != true }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p ~/backups/production
            backup_file="production_backup_$(date +%Y%m%d_%H%M%S).sql"
            db_container=$(docker ps --format '{{.Names}}' | grep -E 'ala-db' | head -1)
            if [ -z "$db_container" ]; then
              echo "::warning::No ala-db container found; skipping backup"
              exit 0
            fi
            docker exec "$db_container" pg_dump -U ala_user ala_production \
              > ~/backups/production/$backup_file
            echo "Backup: $backup_file ($(du -h ~/backups/production/$backup_file | cut -f1))"
            cd ~/backups/production
            ls -t production_backup_*.sql | tail -n +6 | xargs -r rm

      - name: Deploy via swarm-deploy (zero-downtime rolling update)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ~/ala-improved
            echo "[$(date -Iseconds)] CI deploy started from ${{ github.sha }}" \
              >> production-deployment.log
            cd deployment
            ./swarm-deploy

      - name: Public health check
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            code=$(curl -sk -o /tmp/health.json -w "%{http_code}" \
              --max-time 8 "${{ env.PUBLIC_URL }}/api/health" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Public health endpoint OK ($code)"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i/12: $code — retrying in 10s"
            sleep 10
          done
          echo "::error::Public health endpoint never returned 200"
          exit 1

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Write summary
        run: |
          {
            echo "## ALA Production Deployment"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Timestamp: $(date -Iseconds)"
            echo "- Backup: ${{ inputs.skip_backup == true && 'SKIPPED' || 'created' }}"
            echo ""
            if [[ "${{ needs.deploy.result }}" == "success" ]]; then
              echo "**Status:** SUCCESS"
              echo ""
              echo "- App: ${{ env.PUBLIC_URL }}"
              echo "- Health: ${{ env.PUBLIC_URL }}/api/health"
            else
              echo "**Status:** FAILED (${{ needs.deploy.result }})"
              echo ""
              echo "Rollback on the VM:"
              echo '\`\`\`'
              echo 'docker service rollback ala_api'
              echo 'docker service rollback ala_frontend'
              echo '\`\`\`'
            fi
          } >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            exit 1
          fi
